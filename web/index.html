<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Simulator</title>
    <link rel="icon" type="image/png" href="/img/test.png" />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/mobile.css" media="(max-width: 700px)" />
  </head>
  <body>
    <main class="app-shell">
      <section id="login-screen" class="login-card" aria-labelledby="login-title">
        <p class="eyebrow">Game Simulator</p>
        <h1 id="login-title">Bon retour.</h1>
        <p class="intro">Connectez-vous pour accéder à votre espace de jeu.</p>
        <form id="login-form">
          <label for="user">Utilisateur</label>
          <input id="user" name="user" type="text" autocomplete="username" required autofocus />
          <label for="password">Mot de passe</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <button type="submit">Se connecter <span aria-hidden="true">→</span></button>
        </form>
        <p id="auth-status" role="status" aria-live="polite"></p>
      </section>

      <!-- L'espace jeu reste caché tant que l'authentification n'a pas réussi. -->
      <section id="dashboard" class="app-layout" hidden aria-label="Application Game Simulator">
        <aside class="side-menu">
          <div class="menu-header">
            <div class="menu-brand">
              <span class="brand-mark" aria-hidden="true">✦</span>
              <span class="brand-text">Game Simulator</span>
            </div>
          </div>
          <nav id="app-navigation" aria-label="Navigation principale">
            <p class="nav-section-label">Jeu</p>
            <button id="poker-nav" class="nav-link active" type="button" aria-current="page" title="Poker" data-view="poker">
              <span aria-hidden="true">♠</span>
              <span class="nav-link-text">Poker</span>
            </button>
            <p id="admin-nav-label" class="nav-section-label" hidden>Administration</p>
            <button id="admin-nav" class="nav-link" type="button" title="Utilisateurs" data-view="admin" hidden>
              <span aria-hidden="true">⚙</span>
              <span class="nav-link-text">Utilisateurs</span>
            </button>
            <p class="nav-section-label">Compte</p>
            <button id="account-nav" class="nav-link" type="button" title="Mot de passe" data-view="account">
              <span aria-hidden="true">●</span>
              <span class="nav-link-text">Mot de passe</span>
            </button>
          </nav>
          <button id="menu-toggle" class="menu-collapse-button" type="button" aria-expanded="true" aria-controls="app-navigation" aria-label="Réduire le menu">
            <span aria-hidden="true">‹</span>
          </button>
        </aside>

        <div class="main-area">
          <template src="templates/session-actions.html"/>

        <section id="poker-page" class="poker-page content-page" aria-labelledby="poker-title">
          <header class="poker-header">
            <div class="page-heading">
              <p class="eyebrow">Jeu</p>
              <h1 id="poker-title">Poker</h1>
              <p class="intro">Une table NL2 6-max avec cinq joueurs récréatifs.</p>
            </div>
          </header>

          <section id="table-lobby" class="new-game-card" aria-labelledby="new-game-title">
            <div class="card-heading">
              <div>
                <h2 id="new-game-title">Nouvelle table NL2</h2>
                <p>6-max · blindes 0,01 € / 0,02 € · caves de 100bb.</p>
              </div>
              <button id="new-table-button" class="primary-button" type="button">
                Lancer la table <span aria-hidden="true">→</span>
              </button>
            </div>
          </section>

          <!-- La table est alimentée uniquement par le snapshot public du serveur. -->
          <section id="table-screen" class="table-screen" hidden aria-label="Table de poker">
            <div class="table-toolbar">
              <p id="table-status" class="form-status" role="status" aria-live="polite"></p>
              <div class="table-toolbar-actions">
                <span id="llm-controls" class="llm-controls" aria-label="Outils LLM">
                  <label class="extract-count-label" for="extract-count">Mains à exporter</label>
                  <span class="extract-control">
                    <input id="extract-count" class="extract-count" type="number" min="1" max="50" value="10" aria-label="Nombre de mains à exporter" />
                    <button id="extract-button" class="leave-table-button" type="button">Exporter LLM</button>
                  </span>
                  <span id="llm-credit" class="llm-credit" title="Crédit OpenRouter restant"></span>
                  <select id="llm-mode-select" class="llm-mode-select" aria-label="Mode LLM">
                    <option value="llm">LLM</option>
                    <option value="shadow">LLM shadow</option>
                    <option value="off">Sans LLM</option>
                  </select>
                </span>
                <button id="reset-table-button" class="leave-table-button" type="button">Reset table</button>
                <button id="leave-table-button" class="leave-table-button" type="button">Quitter la table</button>
              </div>
            </div>
            <section id="extract-panel" class="extract-panel" hidden aria-labelledby="extract-title">
              <div class="extract-header">
                <div>
                  <p class="eyebrow">Export</p>
                  <h2 id="extract-title">Résumé condensé pour LLM</h2>
                </div>
                <button id="copy-extract-button" class="leave-table-button" type="button">Copier</button>
              </div>
              <textarea id="extract-output" readonly spellcheck="false"></textarea>
            </section>
            <div id="poker-table" class="poker-table">
              <div class="pot"><span id="hand-number" class="hand-number">Main 1</span><span>Pot</span><strong id="pot">0,00 €</strong></div>
              <div id="board" class="board" aria-label="Cartes communes"></div>
            </div>
            <div id="action-panel" class="action-panel" aria-label="Vos actions"></div>
            <section id="hand-result" class="hand-result" hidden aria-labelledby="hand-result-title">
              <p class="eyebrow">Résultat</p>
              <h2 id="hand-result-title">Main terminée</h2>
              <p id="hand-result-reason"></p>
              <div id="hand-result-winners"></div>
            </section>
            <section class="activity-card" aria-labelledby="activity-title">
              <h2 id="activity-title">Actions de la main</h2>
              <ol id="recent-actions"></ol>
            </section>
          </section>
        </section>

        <section id="admin-page" class="poker-page content-page" hidden aria-labelledby="admin-title">
          <header class="poker-header">
            <div class="page-heading">
              <p class="eyebrow">Administration</p>
              <h1 id="admin-title">Utilisateurs</h1>
              <p class="intro">Gérer les accès à l’application.</p>
            </div>
          </header>

          <section class="admin-card" aria-labelledby="create-user-title">
            <h2 id="create-user-title">Créer un utilisateur</h2>
            <form id="user-create-form" class="admin-form">
              <label for="new-username">Utilisateur</label>
              <input id="new-username" name="username" type="text" autocomplete="off" required />
              <label for="new-password">Mot de passe</label>
              <input id="new-password" name="password" type="password" autocomplete="new-password" required />
              <fieldset class="permissions-field">
                <legend>Permissions</legend>
                <label><input name="permissions" type="checkbox" value="admin" /> Admin</label>
                <label><input name="permissions" type="checkbox" value="poker" checked /> Poker</label>
                <label><input name="permissions" type="checkbox" value="llm" /> LLM</label>
              </fieldset>
              <button class="primary-button" type="submit">Créer <span aria-hidden="true">→</span></button>
            </form>
            <p id="admin-status" class="form-status" role="status" aria-live="polite"></p>
          </section>

          <section class="admin-card" aria-labelledby="users-title">
            <h2 id="users-title">Comptes</h2>
            <div class="users-table-wrap">
              <table class="users-table">
                <thead>
                  <tr>
                    <th>Utilisateur</th>
                    <th>Permissions</th>
                    <th>Statut</th>
                    <th>Nouveau mot de passe</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="users-table-body"></tbody>
              </table>
            </div>
          </section>
        </section>

        <section id="account-page" class="poker-page content-page" hidden aria-labelledby="account-title">
          <header class="poker-header">
            <div class="page-heading">
              <p class="eyebrow">Compte</p>
              <h1 id="account-title">Changer le mot de passe</h1>
              <p class="intro">Modifier le mot de passe de votre session.</p>
            </div>
          </header>

          <section class="admin-card" aria-labelledby="password-title">
            <h2 id="password-title">Changer le MDP</h2>
            <form id="password-form" class="admin-form">
              <label for="current-password">Mot de passe actuel</label>
              <input id="current-password" name="current_password" type="password" autocomplete="current-password" required />
              <label for="new-account-password">Nouveau mot de passe</label>
              <input id="new-account-password" name="new_password" type="password" autocomplete="new-password" required />
              <button class="primary-button" type="submit">Mettre à jour <span aria-hidden="true">→</span></button>
            </form>
            <p id="password-status" class="form-status" role="status" aria-live="polite"></p>
          </section>
        </section>
        </div>
      </section>
    </main>
    <script src="/js/app.js"></script>
  </body>
</html>
